name: Build NoStrongPass.deb

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      # Theos and its SDKs almost never change, so cache them keyed on the
      # upstream commit hashes - this avoids re-cloning/downloading several
      # hundred MB on every single run.
      - name: Resolve upstream Theos/SDK revisions
        run: |
          echo "upstream_heads=$(git ls-remote https://github.com/theos/theos | head -n1 | cut -f1)-$(git ls-remote https://github.com/theos/sdks | head -n1 | cut -f1)" >> "$GITHUB_ENV"

      - name: Cache Theos
        id: cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/theos
          key: ${{ runner.os }}-theos-${{ env.upstream_heads }}

      - name: Install Theos
        uses: Randomblock1/theos-action@v1

      - name: Build .deb
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          rm -f packages/*.deb || true
          make package FINALPACKAGE=1

      - name: Show built package(s)
        run: ls -la packages

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: NoStrongPass-deb-${{ matrix.os }}
          path: packages/*.deb
          if-no-files-found: error
